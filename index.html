<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Software Engineer" />
  <title>Your Name</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <script>
    (function () {
      var t = localStorage.getItem('theme');
      if (t !== 'light' && t !== 'dark') {
        t = matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      }
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
</head>
<body>

  <button class="theme-toggle" id="theme-toggle" type="button" aria-label="Toggle theme"></button>

  <aside class="sidebar" id="sidebar" aria-label="Recruiter info">

    <div class="sb-top">
      <p class="sb-name"></p>
      <p class="sb-role"></p>
      <span class="sb-badge"></span>
    </div>

    <div class="sb-tabs">
      <button class="sb-tab-btn active" data-tab="about">about</button>
      <button class="sb-tab-btn" data-tab="experience">experience</button>
      <button class="sb-tab-btn" data-tab="tools">tools</button>
    </div>

    <div class="sb-panel active" id="panel-about">
      <p class="sb-panel-text"></p>

      <div class="about-section">
        <p class="about-section-label">education</p>
      </div>

      <div class="about-section">
        <p class="about-section-label">misc</p>
      </div>
    </div>

    <div class="sb-panel" id="panel-experience">
      <ul class="sb-project-list" id="exp-list"></ul>
    </div>

    <div class="sb-panel" id="panel-tools">
      <div class="sb-project-list" id="tools-list"></div>
    </div>

    <div class="sb-links">
      <a class="sb-link" href="#" target="_blank" rel="noopener">↗ LinkedIn</a>
      <a class="sb-link" id="cv-en" href="#" download>↓ Download CV (EN)</a>
      <a class="sb-link" id="cv-fr" href="#" download>↓ Download CV (FR)</a>
      <button class="sb-link" id="copy-email-btn" type="button">✉ my email</button>
      <span class="copy-confirm" id="copy-confirm">copied to clipboard</span>
    </div>

    <p class="sb-footer"></p>
  </aside>

  <button class="sidebar-tab" id="sidebar-tab" type="button" aria-label="Toggle info">
    <span id="tab-label">about me</span>
  </button>

  <main class="main" id="main">
    <h1></h1>
    <p class="subtitle"></p>

    <div class="socials"></div>
  </main>

  <script type="module" src="src/main.ts"></script>
</body>
</html>
